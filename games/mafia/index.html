<!DOCTYPE html>
<html lang="ky">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Мафия — Билим Арена</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: #0b1020;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .back-btn {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 9999;
      background: rgba(11, 16, 32, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }
    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Башкы бетке
  </a>
  <iframe src="https://mafia-vert.vercel.app/" class="game-frame" allowfullscreen title="Мафия оюну" allow="camera; microphone; display-capture"></iframe>
</body>
</html>
